<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>skyIshier · 十二 | 动态主页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', 'Space Grotesk', system-ui, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            line-height: 1.6;
            overflow-x: hidden;
        }
        #root { min-height: 100vh; width: 100%; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d1117; }
        ::-webkit-scrollbar-thumb { background: rgba(125, 211, 252, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(125, 211, 252, 0.4); }
        .shimmer {
            background-size: 200% auto;
            animation: shimmer 4s linear infinite;
        }
        @keyframes shimmer {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.2); opacity: 1; }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            10% { transform: scale(1.2); }
            20% { transform: scale(1); }
            30% { transform: scale(1.1); }
            40% { transform: scale(1); }
        }
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- 使用 React 和 ReactDOM 从 CDN 加载 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 使用 Babel 支持 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;

        // ============================================================
        // 1. 国际化配置
        // ============================================================
        const i18n = {
            zh: {
                username: 'skyIshier · 十二',
                bio: '游戏逆向 · 二进制分析 · 光遇技术研究',
                langBtn: 'English',
                projectsTitle: '开源项目',
                loading: '加载项目中...',
                footer: '© 2026 skyIshier · 专注光遇技术研究',
                stars: '星标',
                forks: '复刻',
                updated: '更新',
                topics: '主题',
                linkGithub: 'GitHub',
                linkSite: '个人站点',
                linkQQ: 'QQ 联系',
                linkMail: '邮箱',
                noLanguage: '未检测到代码'
            },
            en: {
                username: 'skyIshier · 十二',
                bio: 'Game RE · Binary Analysis · Sky Research',
                langBtn: '中文',
                projectsTitle: 'Open Source Projects',
                loading: 'Loading projects...',
                footer: '© 2026 skyIshier · Built for Sky',
                stars: 'stars',
                forks: 'forks',
                updated: 'Updated',
                topics: 'Topics',
                linkGithub: 'GitHub',
                linkSite: 'Personal Site',
                linkQQ: 'QQ Contact',
                linkMail: 'Email',
                noLanguage: 'No code detected'
            }
        };

        // ============================================================
        // 2. 获取当前语言
        // ============================================================
        function getLang() {
            const params = new URLSearchParams(window.location.search);
            const urlLang = params.get('lang');
            if (urlLang && i18n[urlLang]) return urlLang;
            return navigator.language.startsWith('zh') ? 'zh' : 'en';
        }

        // ============================================================
        // 3. 语言颜色映射
        // ============================================================
        function getLangColor(lang) {
            const map = {
                'JavaScript': '#f1e05a',
                'Python': '#3572A5',
                'C++': '#f34b7d',
                'C': '#555555',
                'Java': '#b07219',
                'TypeScript': '#3178c6',
                'HTML': '#e34c26',
                'CSS': '#563d7c',
                'Shell': '#89e051',
                'Rust': '#dea584',
                'Go': '#00ADD8',
                'Vue': '#41b883',
                'PHP': '#4F5D95',
                'Ruby': '#701516',
                'Swift': '#ffac45',
                'Kotlin': '#A97BFF',
                'Dart': '#00B4AB',
                'C#': '#178600',
                'Objective-C': '#438eff',
                'Lua': '#000080',
                'Perl': '#0298c3',
                'Haskell': '#5e5086',
                'Scala': '#c22d40',
                'Elixir': '#6e4a7e',
                'Clojure': '#db5855',
                'Jupyter Notebook': '#DA5B0B',
                'Makefile': '#427819',
                'CMake': '#DA3434',
                'Assembly': '#6E4C13',
                'VHDL': '#34B2A0',
                'Verilog': '#C8A0C0',
                'Solidity': '#AA6746',
                'PowerShell': '#012456',
                'Batchfile': '#C1F12E',
                'Dockerfile': '#384d54',
                'Nginx': '#009639',
            };
            return map[lang] || '#6e7681';
        }

        // ============================================================
        // 4. 粒子背景组件
        // ============================================================
        function StarField() {
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let width, height;
                let particles = [];
                const PARTICLE_COUNT = 100;
                const MAX_SPEED = 0.6;
                const CONNECT_DIST = 140;
                let raf;

                function resize() {
                    width = canvas.width = window.innerWidth;
                    height = canvas.height = window.innerHeight;
                }

                function initParticles() {
                    particles = [];
                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        particles.push({
                            x: Math.random() * width,
                            y: Math.random() * height,
                            vx: (Math.random() - 0.5) * MAX_SPEED * 2,
                            vy: (Math.random() - 0.5) * MAX_SPEED * 2,
                            radius: 1.2 + Math.random() * 1.8,
                        });
                    }
                }

                function draw() {
                    ctx.clearRect(0, 0, width, height);

                    // 更新和绘制粒子
                    for (const p of particles) {
                        p.x += p.vx;
                        p.y += p.vy;
                        if (p.x < 0 || p.x > width) p.vx *= -1;
                        if (p.y < 0 || p.y > height) p.vy *= -1;

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(136, 192, 255, 0.5)';
                        ctx.fill();
                    }

                    // 画连接线
                    for (let i = 0; i < particles.length; i++) {
                        for (let j = i + 1; j < particles.length; j++) {
                            const dx = particles[i].x - particles[j].x;
                            const dy = particles[i].y - particles[j].y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < CONNECT_DIST) {
                                const opacity = 0.2 * (1 - dist / CONNECT_DIST);
                                ctx.beginPath();
                                ctx.moveTo(particles[i].x, particles[i].y);
                                ctx.lineTo(particles[j].x, particles[j].y);
                                ctx.strokeStyle = `rgba(88, 166, 255, ${opacity})`;
                                ctx.lineWidth = 0.8;
                                ctx.stroke();
                            }
                        }
                    }

                    raf = requestAnimationFrame(draw);
                }

                resize();
                initParticles();
                draw();

                window.addEventListener('resize', () => {
                    resize();
                    initParticles();
                });

                return () => {
                    cancelAnimationFrame(raf);
                    window.removeEventListener('resize', resize);
                };
            }, []);

            return <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-0" />;
        }

        // ============================================================
        // 5. 自定义 Hook: 获取 GitHub 仓库 (参考您的项目)
        // ============================================================
        function useGitHubRepos(username) {
            const [repos, setRepos] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                const controller = new AbortController();

                async function fetchRepos() {
                    setLoading(true);
                    setError(null);

                    try {
                        // 先获取仓库列表
                        const res = await fetch(
                            `https://api.github.com/users/${username}/repos?sort=updated&per_page=100`,
                            { signal: controller.signal }
                        );

                        if (!res.ok) {
                            throw new Error(`Failed to fetch: ${res.status}`);
                        }

                        const data = await res.json();

                        // 过滤掉个人主页仓库
                        const filtered = data.filter(r => !r.name.includes('github.io'));

                        // 为每个项目获取详细语言信息
                        const reposWithLang = await Promise.all(
                            filtered.map(async (repo) => {
                                try {
                                    const langRes = await fetch(repo.languages_url, {
                                        signal: controller.signal
                                    });
                                    const langData = await langRes.json();
                                    const langs = Object.keys(langData);

                                    if (langs.length > 0) {
                                        // 找出字节数最多的语言
                                        let maxLang = langs[0];
                                        let maxBytes = langData[maxLang];
                                        for (const [lang, bytes] of Object.entries(langData)) {
                                            if (bytes > maxBytes) {
                                                maxLang = lang;
                                                maxBytes = bytes;
                                            }
                                        }
                                        repo.language = maxLang;
                                        repo.allLanguages = langs;
                                    } else {
                                        repo.language = null;
                                        repo.allLanguages = [];
                                    }
                                } catch (e) {
                                    repo.language = null;
                                    repo.allLanguages = [];
                                }
                                return repo;
                            })
                        );

                        setRepos(reposWithLang);
                    } catch (err) {
                        if (err.name === 'AbortError') return;
                        setError(err.message);
                    } finally {
                        setLoading(false);
                    }
                }

                fetchRepos();

                return () => {
                    controller.abort();
                };
            }, [username]);

            return { repos, loading, error };
        }

        // ============================================================
        // 6. 主应用组件
        // ============================================================
        function App() {
            const [currentLang, setCurrentLang] = useState(getLang);
            const { repos, loading, error } = useGitHubRepos('skyIshier');

            const t = i18n[currentLang];

            // 切换语言
            const toggleLang = useCallback(() => {
                const nextLang = currentLang === 'zh' ? 'en' : 'zh';
                setCurrentLang(nextLang);
                const url = new URL(window.location);
                url.searchParams.set('lang', nextLang);
                window.history.replaceState({}, '', url);
            }, [currentLang]);

            // 链接配置
            const links = [
                { href: 'https://github.com/skyIshier', icon: 'fab fa-github', label: t.linkGithub },
                { href: 'https://skygf-link.infinityfree.me', icon: 'fas fa-globe', label: t.linkSite },
                { href: 'https://qm.qq.com/q/v06Uaf7Gqm', icon: 'fab fa-qq', label: t.linkQQ },
                { href: 'mailto:3787533101@qq.com', icon: 'fas fa-envelope', label: t.linkMail },
            ];

            return (
                <div className="relative min-h-screen bg-[#0d1117]">
                    <StarField />

                    <div className="relative z-10 container mx-auto px-4 sm:px-6 py-8 sm:py-12 max-w-6xl">
                        {/* Header */}
                        <header className="text-center mb-12 sm:mb-16">
                            <div className="relative inline-block mb-5">
                                <img
                                    src="https://avatars.githubusercontent.com/skyIshier?v=4"
                                    alt="avatar"
                                    className="w-28 h-28 sm:w-32 sm:h-32 rounded-full border-2 border-[#30363d] object-cover transition-all duration-300 hover:border-[#58a6ff] hover:shadow-[0_0_30px_rgba(88,166,255,0.3)] hover:scale-[1.03]"
                                />
                                <span className="absolute bottom-1 right-1 w-4 h-4 bg-[#3fb950] border-2 border-[#0d1117] rounded-full animate-[pulse-dot_2s_infinite]" />
                            </div>

                            <h1 className="text-3xl sm:text-4xl md:text-5xl font-bold mb-2 bg-gradient-to-r from-[#f0f6fc] via-[#58a6ff] to-[#58a6ff] bg-clip-text text-transparent">
                                {t.username}
                            </h1>

                            <p className="text-[#8b949e] text-base sm:text-lg max-w-lg mx-auto mb-5">
                                {t.bio} <span className="cursor-blink">|</span>
                            </p>

                            <button
                                onClick={toggleLang}
                                className="bg-[#21262d] border border-[#30363d] text-[#e6edf3] px-5 py-2 rounded-full text-sm hover:bg-[#30363d] hover:border-[#58a6ff] transition-all hover:shadow-[0_0_12px_rgba(88,166,255,0.2)] hover:-translate-y-0.5"
                            >
                                <i className="fas fa-globe mr-2"></i>
                                {t.langBtn}
                            </button>

                            {/* 链接 */}
                            <div className="flex flex-wrap gap-3 justify-center mt-7">
                                {links.map((link, idx) => (
                                    <a
                                        key={idx}
                                        href={link.href}
                                        target={link.href.startsWith('http') ? '_blank' : undefined}
                                        rel={link.href.startsWith('http') ? 'noopener noreferrer' : undefined}
                                        className="bg-[rgba(33,38,45,0.6)] backdrop-blur-sm border border-[#30363d] text-[#c9d1d9] px-4 py-2 rounded-full text-sm hover:bg-[rgba(31,111,235,0.125)] hover:border-[#58a6ff] hover:-translate-y-1 transition-all hover:shadow-[0_6px_16px_rgba(88,166,255,0.15)] flex items-center gap-2"
                                    >
                                        <i className={link.icon} style={{ color: '#58a6ff' }}></i>
                                        {link.label}
                                    </a>
                                ))}
                            </div>
                        </header>

                        {/* Projects Section */}
                        <section>
                            <h2 className="text-2xl sm:text-3xl font-semibold mb-6 pb-3 border-b border-[#30363d] flex items-center gap-3">
                                <i className="fas fa-code-branch text-[#58a6ff]"></i>
                                {t.projectsTitle}
                            </h2>

                            {loading && (
                                <div className="text-center text-[#8b949e] py-16">
                                    <i className="fas fa-spinner text-4xl text-[#58a6ff] block mb-4 animate-[spin_1.5s_linear_infinite]"></i>
                                    {t.loading}
                                </div>
                            )}

                            {error && (
                                <div className="text-center text-[#f85149] py-16">
                                    <i className="fas fa-exclamation-triangle text-3xl block mb-3"></i>
                                    加载失败，请刷新重试
                                </div>
                            )}

                            {!loading && !error && (
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                                    {repos.map((repo) => {
                                        const primaryLang = repo.language;
                                        const langColor = primaryLang ? getLangColor(primaryLang) : '#6e7681';
                                        const langDisplay = primaryLang || t.noLanguage;
                                        const topics = repo.topics ? repo.topics.slice(0, 3) : [];
                                        const updatedAt = repo.updated_at ? new Date(repo.updated_at).toLocaleDateString() : '';
                                        const desc = repo.description || '-';

                                        return (
                                            <a
                                                key={repo.id}
                                                href={repo.html_url}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="bg-[rgba(22,27,34,0.7)] backdrop-blur-sm border border-[#30363d] rounded-2xl p-5 transition-all duration-300 hover:border-[#58a6ff] hover:-translate-y-1.5 hover:scale-[1.01] hover:shadow-[0_12px_40px_rgba(0,0,0,0.5),0_0_0_1px_rgba(88,166,255,0.2)] hover:bg-[rgba(30,38,48,0.85)] flex flex-col relative overflow-hidden group"
                                            >
                                                <div className="absolute inset-0 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-500 bg-[radial-gradient(circle_at_30%_40%,rgba(88,166,255,0.04),transparent_70%)]" />

                                                <div className="repo-name text-[#58a6ff] font-semibold text-lg flex items-center gap-2 mb-1.5">
                                                    <i className="fas fa-folder-open text-[#6e7681] text-sm"></i>
                                                    {repo.name}
                                                </div>

                                                <div className="text-[#b1bac4] text-sm flex-1 mb-3 line-clamp-2">
                                                    {desc}
                                                </div>

                                                <div className="flex flex-wrap items-center gap-3 text-xs text-[#8b949e] pt-2 border-t border-dashed border-[#2d333b] mb-2">
                                                    <span className="flex items-center gap-1.5">
                                                        <span
                                                            className="inline-block w-2.5 h-2.5 rounded-full"
                                                            style={{ background: langColor }}
                                                        />
                                                        {langDisplay}
                                                    </span>
                                                    {updatedAt && (
                                                        <span className="flex items-center gap-1.5">
                                                            <i className="far fa-calendar-alt text-[#6e7681]"></i>
                                                            {t.updated}: {updatedAt}
                                                        </span>
                                                    )}
                                                    {topics.length > 0 && (
                                                        <span className="flex items-center gap-1.5">
                                                            <i className="fas fa-tags text-[#6e7681]"></i>
                                                            {topics.join(', ')}
                                                        </span>
                                                    )}
                                                </div>

                                                <div className="flex items-center gap-4 text-sm text-[#6e7681] pt-2 border-t border-[#2d333b]">
                                                    <span className="flex items-center gap-1.5">
                                                        <i className="fas fa-star text-[#8b949e]"></i>
                                                        {repo.stargazers_count} {t.stars}
                                                    </span>
                                                    <span className="flex items-center gap-1.5">
                                                        <i className="fas fa-code-branch text-[#8b949e]"></i>
                                                        {repo.forks_count} {t.forks}
                                                    </span>
                                                    {repo.size && (
                                                        <span className="flex items-center gap-1.5">
                                                            <i className="fas fa-database text-[#8b949e]"></i>
                                                            {(repo.size / 1024).toFixed(1)} MB
                                                        </span>
                                                    )}
                                                </div>
                                            </a>
                                        );
                                    })}
                                </div>
                            )}

                            {!loading && !error && repos.length === 0 && (
                                <div className="text-center text-[#8b949e] py-16">
                                    <i className="fas fa-inbox text-3xl block mb-3"></i>
                                    暂无公开项目
                                </div>
                            )}
                        </section>

                        {/* Footer */}
                        <footer className="text-center text-[#6e7681] text-sm pt-10 mt-6 border-t border-[#30363d] flex justify-center items-center gap-3 flex-wrap">
                            <span>© 2026 skyIshier</span>
                            <span>·</span>
                            <span>
                                <i className="fas fa-heart text-[#f97583] animate-[heartBeat_2s_infinite]"></i>
                                {' '}{t.footer.split('·')[1]?.trim() || t.footer}
                            </span>
                        </footer>
                    </div>
                </div>
            );
        }

        // ============================================================
        // 7. 渲染
        // ============================================================
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>skyIshier · 十二 | 动态主页</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #e6edf3;
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 24px 60px;
        }

        /* ===== 头部 ===== */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #30363d;
            transition: all 0.4s ease;
            object-fit: cover;
        }

        .avatar-wrapper:hover .avatar {
            transform: scale(1.03);
            border-color: #58a6ff;
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.3);
        }

        .status-dot {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 18px;
            height: 18px;
            background: #3fb950;
            border: 2px solid #0d1117;
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.9;
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #f0f6fc 0%, #58a6ff 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
        }

        .bio {
            color: #8b949e;
            font-size: 1.15rem;
            max-width: 600px;
            margin: 8px auto 20px;
        }

        .lang-switch {
            background: #21262d;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 8px 22px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .lang-switch:hover {
            background: #30363d;
            border-color: #58a6ff;
            box-shadow: 0 0 12px rgba(88, 166, 255, 0.2);
            transform: translateY(-2px);
        }

        .links {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 28px;
        }

        .links a {
            color: #c9d1d9;
            background: rgba(33, 38, 45, 0.6);
            backdrop-filter: blur(4px);
            text-decoration: none;
            padding: 8px 18px;
            border: 1px solid #30363d;
            border-radius: 30px;
            transition: all 0.25s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .links a i {
            font-size: 1rem;
            color: #58a6ff;
        }

        .links a:hover {
            background: #1f6feb20;
            border-color: #58a6ff;
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(88, 166, 255, 0.15);
            color: #f0f6fc;
        }

        /* 下载按钮特殊样式 (与links一致但独立) */
        .download-btn {
            color: #c9d1d9;
            background: rgba(33, 38, 45, 0.6);
            backdrop-filter: blur(4px);
            text-decoration: none;
            padding: 8px 18px;
            border: 1px solid #30363d;
            border-radius: 30px;
            transition: all 0.25s ease;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-family: inherit;
        }
        .download-btn i {
            font-size: 1rem;
            color: #58a6ff;
        }
        .download-btn:hover {
            background: #1f6feb20;
            border-color: #58a6ff;
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(88, 166, 255, 0.15);
            color: #f0f6fc;
        }

        /* ===== 项目区域 ===== */
        section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 28px;
            padding-bottom: 14px;
            border-bottom: 1px solid #30363d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title i {
            color: #58a6ff;
            font-size: 1.6rem;
        }

        .repo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 24px;
        }

        .repo-card {
            background: rgba(22, 27, 34, 0.7);
            backdrop-filter: blur(6px);
            border: 1px solid #30363d;
            border-radius: 18px;
            padding: 22px 22px 18px;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .repo-card:hover {
            border-color: #58a6ff;
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(88, 166, 255, 0.2);
            background: rgba(30, 38, 48, 0.85);
        }

        .repo-name {
            font-size: 1.15rem;
            font-weight: 600;
            color: #58a6ff;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .repo-name i {
            font-size: 0.9rem;
            color: #6e7681;
        }

        .repo-desc {
            color: #b1bac4;
            font-size: 0.95rem;
            flex: 1;
            margin-bottom: 14px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .repo-extra {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            font-size: 0.8rem;
            color: #8b949e;
            margin-bottom: 10px;
            padding: 6px 0 4px;
            border-top: 1px dashed #2d333b;
        }

        .repo-extra span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .repo-extra .language-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 2px;
            flex-shrink: 0;
        }

        .repo-meta {
            margin-top: 4px;
            font-size: 0.85rem;
            color: #6e7681;
            display: flex;
            gap: 18px;
            align-items: center;
            border-top: 1px solid #2d333b;
            padding-top: 12px;
        }

        .repo-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .loading {
            text-align: center;
            color: #8b949e;
            padding: 60px 20px;
            font-size: 1.1rem;
            grid-column: 1 / -1;
        }

        .loading i {
            font-size: 2rem;
            margin-bottom: 16px;
            display: block;
            color: #58a6ff;
            animation: spin 1.5s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        footer {
            text-align: center;
            color: #6e7681;
            font-size: 0.95rem;
            padding-top: 40px;
            border-top: 1px solid #30363d;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        footer i {
            color: #f97583;
            animation: heartBeat 2s infinite;
        }

        @keyframes heartBeat {
            0%,
            100% {
                transform: scale(1);
            }
            10% {
                transform: scale(1.2);
            }
            20% {
                transform: scale(1);
            }
            30% {
                transform: scale(1.1);
            }
            40% {
                transform: scale(1);
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px 16px 40px;
            }
            h1 {
                font-size: 2.2rem;
            }
            .repo-grid {
                grid-template-columns: 1fr;
            }
            .avatar {
                width: 100px;
                height: 100px;
            }
            .status-dot {
                width: 14px;
                height: 14px;
                bottom: 4px;
                right: 4px;
            }
        }

        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="container">
        <header>
            <div class="avatar-wrapper">
                <img class="avatar" src="https://avatars.githubusercontent.com/skyIshier?v=4" alt="avatar">
                <span class="status-dot"></span>
            </div>
            <h1 id="username">skyIshier · 十二</h1>
            <p class="bio" id="bio">
                游戏逆向 · 二进制分析 · 光遇技术研究
                <span class="cursor-blink">|</span>
            </p>
            <button class="lang-switch" id="langBtn">
                <i class="fas fa-globe"></i> English
            </button>
            <div class="links" id="linksContainer">
                <!-- 动态生成，但我们将下载按钮也放在这里，方便布局 -->
            </div>
            <!-- 独立下载按钮 (同时出现在links区域) 通过js注入，但为了清晰，也在这里留一个备用容器，实际由js统一渲染 -->
        </header>

        <section>
            <h2 class="section-title" id="projectsTitle">
                <i class="fas fa-code-branch"></i> 开源项目
            </h2>
            <div id="repoContainer" class="repo-grid">
                <div class="loading">
                    <i class="fas fa-spinner"></i>
                    加载项目中...
                </div>
            </div>
        </section>

        <footer id="footer">
            <span>© 2026 skyIshier</span>
            <span>·</span>
            <span><i class="fas fa-heart"></i> 专注光遇技术研究</span>
        </footer>
    </div>

    <script>
        // ============================================================
        // 1. 粒子背景
        // ============================================================
        (function initParticles() {
            const canvas = document.getElementById('particle-canvas');
            const ctx = canvas.getContext('2d');
            let width, height;
            let particles = [];
            const PARTICLE_COUNT = 100;
            const MAX_SPEED = 0.6;
            const CONNECT_DIST = 140;

            function resize() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * width;
                    this.y = Math.random() * height;
                    this.vx = (Math.random() - 0.5) * MAX_SPEED * 2;
                    this.vy = (Math.random() - 0.5) * MAX_SPEED * 2;
                    this.radius = 1.2 + Math.random() * 1.8;
                }
                update() {
                    this.x += this.vx;
                    this.y += this.vy;
                    if (this.x < 0 || this.x > width) { this.vx *= -1;
                        this.x += this.vx; }
                    if (this.y < 0 || this.y > height) { this.vy *= -1;
                        this.y += this.vy; }
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(136, 192, 255, 0.5)';
                    ctx.fill();
                }
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }

            function drawLines() {
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < CONNECT_DIST) {
                            const opacity = 0.2 * (1 - dist / CONNECT_DIST);
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(88, 166, 255, ${opacity})`;
                            ctx.lineWidth = 0.8;
                            ctx.stroke();
                        }
                    }
                }
            }

            function animate() {
                ctx.clearRect(0, 0, width, height);
                particles.forEach(p => { p.update();
                    p.draw(); });
                drawLines();
                requestAnimationFrame(animate);
            }
            animate();
        })();


        // ============================================================
        // 2. 国际化配置 (增加下载按钮文案)
        // ============================================================
        const i18n = {
            zh: {
                username: 'skyIshier · 十二',
                bio: '游戏逆向 · 二进制分析 · 光遇技术研究',
                langBtn: 'English',
                projectsTitle: '开源项目',
                loading: '加载项目中...',
                footer: '© 2026 skyIshier · 专注光遇技术研究',
                stars: '星标',
                forks: '复刻',
                updated: '更新',
                topics: '主题',
                linkGithub: 'GitHub',
                linkSite: '个人站点',
                linkQQ: 'QQ 联系',
                linkMail: '邮箱',
                download: '下载文件整合'   // 新增
            },
            en: {
                username: 'skyIshier · 十二',
                bio: 'Game RE · Binary Analysis · Sky Research',
                langBtn: '中文',
                projectsTitle: 'Open Source Projects',
                loading: 'Loading projects...',
                footer: '© 2026 skyIshier · Built for Sky',
                stars: 'stars',
                forks: 'forks',
                updated: 'Updated',
                topics: 'Topics',
                linkGithub: 'GitHub',
                linkSite: 'Personal Site',
                linkQQ: 'QQ Contact',
                linkMail: 'Email',
                download: 'Download Archive'   // 新增
            }
        };

        function getLang() {
            const params = new URLSearchParams(window.location.search);
            const urlLang = params.get('lang');
            if (urlLang && i18n[urlLang]) return urlLang;
            return navigator.language.startsWith('zh') ? 'zh' : 'en';
        }

        let currentLang = getLang();

        // ============================================================
        // 3. 语言颜色映射
        // ============================================================
        function getLangColor(lang) {
            const map = {
                'JavaScript': '#f1e05a',
                'Python': '#3572A5',
                'C++': '#f34b7d',
                'C': '#555555',
                'Java': '#b07219',
                'TypeScript': '#3178c6',
                'HTML': '#e34c26',
                'CSS': '#563d7c',
                'Shell': '#89e051',
                'Rust': '#dea584',
                'Go': '#00ADD8',
                'Vue': '#41b883',
                'PHP': '#4F5D95',
                'Ruby': '#701516',
                'Swift': '#ffac45',
                'Kotlin': '#A97BFF',
                'Dart': '#00B4AB',
                'C#': '#178600',
                'Objective-C': '#438eff',
                'Lua': '#000080',
                'Perl': '#0298c3',
                'Haskell': '#5e5086',
                'Scala': '#c22d40',
                'Elixir': '#6e4a7e',
                'Clojure': '#db5855',
                'Jupyter Notebook': '#DA5B0B',
                'Makefile': '#427819',
                'CMake': '#DA3434',
                'Assembly': '#6E4C13',
                'VHDL': '#34B2A0',
                'Verilog': '#C8A0C0',
                'Solidity': '#AA6746',
                'PowerShell': '#012456',
                'Batchfile': '#C1F12E',
                'Dockerfile': '#384d54',
            };
            return map[lang] || '#6e7681';
        }

        // ============================================================
        // 4. 渲染函数 (包含下载按钮)
        // ============================================================
        function renderLinks() {
            const t = i18n[currentLang];
            const container = document.getElementById('linksContainer');
            // 注意：下载按钮使用 .download-btn 样式，点击触发下载
            container.innerHTML = `
                        <a href="https://github.com/skyIshier" target="_blank"><i class="fab fa-github"></i> ${t.linkGithub}</a>
                        <a href="https://skygf-link.infinityfree.me" target="_blank"><i class="fas fa-globe"></i> ${t.linkSite}</a>
                        <a href="https://qm.qq.com/q/v06Uaf7Gqm" target="_blank"><i class="fab fa-qq"></i> ${t.linkQQ}</a>
                        <a href="mailto:3787533101@qq.com"><i class="fas fa-envelope"></i> ${t.linkMail}</a>
                        <button class="download-btn" id="downloadBtn"><i class="fas fa-file-archive"></i> ${t.download}</button>
                    `;
            // 绑定下载事件 (必须等元素渲染完成)
            const downloadBtn = document.getElementById('downloadBtn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', function(e) {
                    // 下载同目录下的 文件整合.zip
                    const url = '文件整合.zip';
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = '文件整合.zip';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                });
            }
        }

        function renderText() {
            const t = i18n[currentLang];
            document.getElementById('username').textContent = t.username;
            const bioEl = document.getElementById('bio');
            bioEl.innerHTML = t.bio + ' <span class="cursor-blink">|</span>';
            document.getElementById('langBtn').innerHTML = `<i class="fas fa-globe"></i> ${t.langBtn}`;
            document.getElementById('projectsTitle').innerHTML = `<i class="fas fa-code-branch"></i> ${t.projectsTitle}`;
            document.getElementById('footer').innerHTML =
                `<span>© 2026 skyIshier</span><span>·</span><span><i class="fas fa-heart"></i> ${t.footer.split('·')[1]?.trim() || t.footer}</span>`;
            document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
            // 重新渲染链接 (包含下载按钮)
            renderLinks();
        }

        // ============================================================
        // 5. 获取 GitHub 仓库 (完全参考您的 useGitHubRepos)
        // ============================================================
        async function fetchRepos() {
            const container = document.getElementById('repoContainer');
            const t = i18n[currentLang];
            container.innerHTML = `<div class="loading"><i class="fas fa-spinner"></i> ${t.loading}</div>`;

            try {
                // 第一步：获取仓库列表
                const res = await fetch('https://api.github.com/users/skyIshier/repos?sort=updated&per_page=100');
                if (!res.ok) throw new Error('API error');
                const repos = await res.json();

                // 过滤掉个人主页仓库
                const filtered = repos.filter(r => !r.name.includes('github.io'));

                if (filtered.length === 0) {
                    container.innerHTML = `<div class="loading">✨ 暂无公开项目</div>`;
                    return;
                }

                // 第二步：为每个项目获取详细语言信息 (参考您的 useGitHubRepos)
                const reposWithLang = await Promise.all(
                    filtered.map(async (repo) => {
                        try {
                            const langRes = await fetch(repo.languages_url);
                            const langData = await langRes.json();
                            const langs = Object.keys(langData);

                            if (langs.length > 0) {
                                let maxLang = langs[0];
                                let maxBytes = langData[maxLang];
                                for (const [lang, bytes] of Object.entries(langData)) {
                                    if (bytes > maxBytes) {
                                        maxLang = lang;
                                        maxBytes = bytes;
                                    }
                                }
                                repo.language = maxLang;
                                repo.allLanguages = langs;
                            } else {
                                repo.language = null;
                                repo.allLanguages = [];
                            }
                        } catch (e) {
                            repo.language = null;
                            repo.allLanguages = [];
                        }
                        return repo;
                    })
                );

                // 第三步：渲染
                container.innerHTML = reposWithLang.map(repo => {
                    const desc = repo.description || '-';
                    const primaryLang = repo.language;
                    const langColor = primaryLang ? getLangColor(primaryLang) : '#6e7681';
                    const topics = repo.topics ? repo.topics.slice(0, 3) : [];
                    const updatedAt = repo.updated_at ? new Date(repo.updated_at).toLocaleDateString() : '';

                    const langDisplay = primaryLang || '未检测到代码';

                    return `
                                <a href="${repo.html_url}" target="_blank" class="repo-card">
                                    <div class="repo-name">
                                        <i class="fas fa-folder-open"></i> ${repo.name}
                                    </div>
                                    <div class="repo-desc">${desc}</div>
                                    <div class="repo-extra">
                                        <span><span class="language-dot" style="background:${langColor};"></span> ${langDisplay}</span>
                                        ${updatedAt ? `<span><i class="far fa-calendar-alt"></i> ${t.updated}: ${updatedAt}</span>` : ''}
                                        ${topics.length ? `<span><i class="fas fa-tags"></i> ${topics.join(', ')}</span>` : ''}
                                    </div>
                                    <div class="repo-meta">
                                        <span><i class="fas fa-star"></i> ${repo.stargazers_count} ${t.stars}</span>
                                        <span><i class="fas fa-code-branch"></i> ${repo.forks_count} ${t.forks}</span>
                                        ${repo.size ? `<span><i class="fas fa-database"></i> ${(repo.size/1024).toFixed(1)} MB</span>` : ''}
                                    </div>
                                </a>
                            `;
                }).join('');

            } catch (e) {
                container.innerHTML = `<div class="loading"><i class="fas fa-exclamation-triangle"></i> 加载失败，请刷新重试</div>`;
                console.warn('Fetch repos error:', e);
            }
        }

        // ============================================================
        // 6. 切换语言
        // ============================================================
        document.getElementById('langBtn').addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            const url = new URL(window.location);
            url.searchParams.set('lang', currentLang);
            window.history.replaceState({}, '', url);
            renderText();
            fetchRepos();
        });

        // ============================================================
        // 7. 初始化
        // ============================================================
        renderText();
        fetchRepos();
    </script>
